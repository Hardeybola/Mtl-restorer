<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Restorer — MTL Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --ink: #1A1612;
    --ink-2: #221D18;
    --paper: #F0E6D2;
    --paper-dim: #C9BFA8;
    --gold: #C9A876;
    --brown: #5B4636;
    --brown-light: #6E5644;
    --stamp: #8B3A3A;
    --stamp-dim: #A85C5C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #root{min-height:100vh;}
  ::selection{ background: var(--gold); color: var(--ink); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  .scrollbar-hide::-webkit-scrollbar{ display:none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulseRing {
    0% { box-shadow: 0 0 0 0 rgba(201,168,118,0.4); }
    70% { box-shadow: 0 0 0 8px rgba(201,168,118,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,118,0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script>
  window.onerror = function(msg, url, line, col, error) {
    var root = document.getElementById("root");
    if (root) {
      root.innerHTML = "<div style='color:#ff8080; padding:20px; font-family:monospace; white-space:pre-wrap;'>JS ERROR: " + msg + "\nLine: " + line + ", Col: " + col + (error && error.stack ? "\n\n" + error.stack : "") + "</div>";
    }
  };
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- IndexedDB local history store ---------- */
const DB_NAME = "restorer-db";
const STORE = "chapters";

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: "id" });
        store.createIndex("createdAt", "createdAt");
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbSave(record) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).put(record);
    tx.oncomplete = () => resolve(record);
    tx.onerror = () => reject(tx.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readonly");
    const req = tx.objectStore(STORE).getAll();
    req.onsuccess = () => resolve(req.result.sort((a,b) => b.createdAt - a.createdAt));
    req.onerror = () => reject(req.error);
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE, "readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

/* ---------- Claude API call ---------- */
async function restoreText(rawText) {
  const systemPrompt = `You are a literary restoration editor. You receive raw machine-translated (MTL) text from Chinese/Korean/Japanese web novels — text that is grammatically broken, awkwardly literal, and stiff. Your job is to rewrite it into fluent, natural, idiomatic English prose, as if a skilled human translator had produced it.

Rules:
- Preserve all plot content, dialogue meaning, character names, and details exactly. Do not omit, summarize, or add events.
- Fix grammar, sentence structure, and word choice freely for maximum readability and natural flow.
- Keep character voice and tone (e.g. comedic, dramatic, archaic) consistent with what the raw text implies.
- Resolve obviously garbled idioms/proverbs into their natural English equivalent meaning, don't translate literally.
- Output ONLY the restored chapter text. No preamble, no notes, no explanations, no markdown headers.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 4096,
      system: systemPrompt,
      messages: [{ role: "user", content: rawText }]
    })
  });

  if (!response.ok) {
    throw new Error("Restoration request failed (" + response.status + ")");
  }
  const data = await response.json();
  const text = data.content
    .map(block => (block.type === "text" ? block.text : ""))
    .filter(Boolean)
    .join("\n");
  return text.trim();
}

/* ---------- Fetch a chapter URL and extract readable text ---------- */
async function fetchChapterFromUrl(url) {
  // Use a CORS-friendly text-extraction proxy so this works from a plain browser tab.
  const proxied = "https://r.jina.ai/" + url;
  const res = await fetch(proxied);
  if (!res.ok) throw new Error("Could not fetch that page (" + res.status + ")");
  const text = await res.text();

  // r.jina.ai returns a cleaned markdown-ish rendering of the page.
  // Trim obvious nav/footer cruft heuristically: keep the largest contiguous text block.
  const lines = text.split("\n").map(l => l.trim());
  const paragraphs = lines.filter(l => l.length > 0);
  // Heuristic: drop lines that look like nav links (very short, or mostly link syntax)
  const cleaned = paragraphs.filter(l => {
    const linkRatio = (l.match(/\[.*?\]\(.*?\)/g) || []).join("").length / Math.max(l.length,1);
    return linkRatio < 0.5;
  });
  return cleaned.join("\n\n");
}

/* ---------- UI Components ---------- */

function Logo() {
  return (
    <div style={{display:"flex", alignItems:"center", gap:10}}>
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M3 21 L13 4 L23 21" stroke="#C9A876" strokeWidth="1.6" strokeLinejoin="round" fill="none"/>
        <path d="M7.5 21 L13 11.5 L18.5 21" stroke="#8B3A3A" strokeWidth="1.6" strokeLinejoin="round" fill="none" opacity="0.85"/>
      </svg>
      <span style={{
        fontFamily:"'Source Serif 4', serif",
        fontWeight:600,
        fontSize:19,
        letterSpacing:"0.01em",
        color:"#F0E6D2"
      }}>Restorer</span>
    </div>
  );
}

function GlyphDivider(){
  return (
    <div aria-hidden="true" style={{
      display:"flex", alignItems:"center", justifyContent:"center",
      gap:8, margin:"28px 0", opacity:0.5
    }}>
      <div style={{height:1, width:36, background:"linear-gradient(90deg, transparent, #6E5644)"}}/>
      <span style={{color:"#C9A876", fontSize:11, letterSpacing:"0.15em"}}>⟡</span>
      <div style={{height:1, width:36, background:"linear-gradient(90deg, #6E5644, transparent)"}}/>
    </div>
  );
}

function EmptyState({ onPasteSample }) {
  return (
    <div style={{
      textAlign:"center", padding:"60px 24px 40px",
      animation:"fadeUp 0.5s ease-out"
    }}>
      <div style={{
        fontFamily:"'Source Serif 4', serif", fontSize:15, lineHeight:1.7,
        color:"var(--paper-dim)", maxWidth:380, margin:"0 auto"
      }}>
        Paste a raw machine-translated chapter, or a chapter link, and it will be restored into clean, readable English — your phrasing intact, the meaning untouched.
      </div>
    </div>
  );
}

function RawReveal({ raw, clean }) {
  const [showRaw, setShowRaw] = useState(false);
  return (
    <div>
      <div style={{
        display:"flex", justifyContent:"flex-end", marginBottom:14
      }}>
        <button
          onClick={() => setShowRaw(s => !s)}
          style={{
            background: showRaw ? "rgba(139,58,58,0.18)" : "transparent",
            border: "1px solid " + (showRaw ? "var(--stamp-dim)" : "var(--brown-light)"),
            color: showRaw ? "var(--stamp-dim)" : "var(--paper-dim)",
            borderRadius: 20,
            padding: "6px 14px",
            fontSize: 12,
            fontFamily: "'JetBrains Mono', monospace",
            letterSpacing: "0.04em",
            cursor: "pointer",
            transition: "all 0.2s ease",
            display:"flex", alignItems:"center", gap:6
          }}
        >
          <span style={{
            width:6, height:6, borderRadius:"50%",
            background: showRaw ? "var(--stamp-dim)" : "var(--gold)",
            display:"inline-block"
          }}/>
          {showRaw ? "VIEWING RAW" : "VIEW RAW"}
        </button>
      </div>

      {showRaw ? (
        <div style={{
          fontFamily:"'JetBrains Mono', monospace",
          fontSize: 13.5,
          lineHeight: 1.85,
          color: "rgba(168,92,92,0.85)",
          letterSpacing: "0.01em",
          whiteSpace: "pre-wrap",
          animation: "fadeUp 0.3s ease-out",
          padding: "18px 20px",
          background: "rgba(139,58,58,0.06)",
          border: "1px solid rgba(139,58,58,0.25)",
          borderRadius: 10
        }}>
          {raw}
        </div>
      ) : (
        <div style={{
          fontFamily: "'Source Serif 4', serif",
          fontSize: 18,
          lineHeight: 1.85,
          color: "var(--paper)",
          letterSpacing: "0.005em",
          whiteSpace: "pre-wrap",
          animation: "fadeUp 0.3s ease-out"
        }}>
          {clean.split("\n\n").map((p, i) => (
            <p key={i} style={{margin: "0 0 1.1em 0"}}>{p}</p>
          ))}
        </div>
      )}
    </div>
  );
}

function RestoringAnimation(){
  return (
    <div style={{padding:"50px 10px", textAlign:"center"}}>
      <div style={{
        display:"inline-block",
        fontFamily:"'JetBrains Mono', monospace",
        fontSize: 13,
        color: "var(--gold)",
        letterSpacing:"0.08em",
        marginBottom: 18
      }}>
        RESTORING
      </div>
      <div style={{
        height: 2, width: 180, margin:"0 auto",
        background: "linear-gradient(90deg, transparent, var(--gold), transparent)",
        backgroundSize: "200% 100%",
        animation: "shimmer 1.4s ease-in-out infinite",
        borderRadius: 2
      }}/>
      <div style={{
        marginTop: 22, fontSize: 13, color: "var(--paper-dim)",
        fontFamily: "'Inter', sans-serif"
      }}>
        Untangling syntax, smoothing phrasing…
      </div>
    </div>
  );
}

function InputPanel({ onSubmit, busy }) {
  const [mode, setMode] = useState("paste"); // paste | url
  const [text, setText] = useState("");
  const [url, setUrl] = useState("");

  const handleSubmit = () => {
    if (mode === "paste" && text.trim()) onSubmit({ type: "paste", value: text.trim() });
    if (mode === "url" && url.trim()) onSubmit({ type: "url", value: url.trim() });
  };

  return (
    <div style={{
      background: "var(--ink-2)",
      border: "1px solid var(--brown)",
      borderRadius: 14,
      padding: 18,
      animation: "fadeUp 0.4s ease-out"
    }}>
      <div style={{display:"flex", gap:6, marginBottom:14}}>
        {["paste","url"].map(m => (
          <button key={m} onClick={() => setMode(m)} style={{
            flex:1,
            padding:"9px 0",
            borderRadius:8,
            border: "1px solid " + (mode===m ? "var(--gold)" : "transparent"),
            background: mode===m ? "rgba(201,168,118,0.1)" : "transparent",
            color: mode===m ? "var(--gold)" : "var(--paper-dim)",
            fontFamily:"'Inter', sans-serif",
            fontSize:13,
            fontWeight:600,
            letterSpacing:"0.02em",
            cursor:"pointer",
            transition:"all 0.2s ease"
          }}>
            {m === "paste" ? "Paste text" : "Chapter link"}
          </button>
        ))}
      </div>

      {mode === "paste" ? (
        <textarea
          value={text}
          onChange={e => setText(e.target.value)}
          placeholder="Paste the raw MTL chapter here…"
          rows={7}
          style={{
            width:"100%",
            background: "var(--ink)",
            border: "1px solid var(--brown)",
            borderRadius: 8,
            color: "var(--paper)",
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 13.5,
            lineHeight: 1.7,
            padding: 14,
            resize: "vertical",
            outline: "none"
          }}
          onFocus={e => e.target.style.borderColor = "var(--gold)"}
          onBlur={e => e.target.style.borderColor = "var(--brown)"}
        />
      ) : (
        <input
          value={url}
          onChange={e => setUrl(e.target.value)}
          placeholder="https://lnmtl.com/chapter/..."
          style={{
            width:"100%",
            background: "var(--ink)",
            border: "1px solid var(--brown)",
            borderRadius: 8,
            color: "var(--paper)",
            fontFamily: "'JetBrains Mono', monospace",
            fontSize: 13.5,
            padding: "12px 14px",
            outline: "none"
          }}
          onFocus={e => e.target.style.borderColor = "var(--gold)"}
          onBlur={e => e.target.style.borderColor = "var(--brown)"}
        />
      )}

      <button
        onClick={handleSubmit}
        disabled={busy || (mode==="paste" ? !text.trim() : !url.trim())}
        style={{
          width: "100%",
          marginTop: 14,
          padding: "13px 0",
          borderRadius: 8,
          border: "none",
          background: busy ? "var(--brown)" : "var(--gold)",
          color: busy ? "var(--paper-dim)" : "var(--ink)",
          fontFamily: "'Inter', sans-serif",
          fontWeight: 700,
          fontSize: 14,
          letterSpacing: "0.02em",
          cursor: busy ? "default" : "pointer",
          opacity: (mode==="paste" ? !text.trim() : !url.trim()) ? 0.4 : 1,
          transition: "all 0.2s ease"
        }}
      >
        {busy ? "Restoring…" : "Restore chapter"}
      </button>
    </div>
  );
}

function HistoryItem({ item, onOpen, onDelete }) {
  const preview = item.cleanText.slice(0, 90);
  const date = new Date(item.createdAt).toLocaleDateString(undefined, { month:"short", day:"numeric" });
  return (
    <div
      onClick={() => onOpen(item)}
      style={{
        padding: "14px 16px",
        background: "var(--ink-2)",
        border: "1px solid var(--brown)",
        borderRadius: 10,
        marginBottom: 10,
        cursor: "pointer",
        position: "relative",
        transition: "border-color 0.2s ease"
      }}
      onMouseEnter={e => e.currentTarget.style.borderColor = "var(--gold)"}
      onMouseLeave={e => e.currentTarget.style.borderColor = "var(--brown)"}
    >
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:6}}>
        <span style={{fontSize:11, fontFamily:"'JetBrains Mono', monospace", color:"var(--gold)", letterSpacing:"0.05em"}}>{date}</span>
        <button
          onClick={(e) => { e.stopPropagation(); onDelete(item.id); }}
          style={{
            background:"none", border:"none", color:"var(--paper-dim)",
            cursor:"pointer", fontSize:12, padding:4
          }}
        >✕</button>
      </div>
      <div style={{
        fontFamily:"'Source Serif 4', serif", fontSize:14.5, lineHeight:1.5,
        color:"var(--paper)", overflow:"hidden", textOverflow:"ellipsis",
        display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical"
      }}>
        {preview}…
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState("home"); // home | reading | history
  const [current, setCurrent] = useState(null); // {rawText, cleanText, createdAt, id}
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    dbGetAll().then(setHistory).catch(() => {});
  }, []);

  const handleSubmit = useCallback(async (input) => {
    setError(null);
    setBusy(true);
    try {
      let rawText;
      if (input.type === "paste") {
        rawText = input.value;
      } else {
        rawText = await fetchChapterFromUrl(input.value);
        if (!rawText || rawText.length < 50) {
          throw new Error("Couldn't extract chapter text from that link. Try pasting the text directly instead.");
        }
      }

      const cleanText = await restoreText(rawText);
      const record = {
        id: "ch_" + Date.now(),
        rawText,
        cleanText,
        sourceUrl: input.type === "url" ? input.value : null,
        createdAt: Date.now()
      };
      await dbSave(record);
      setHistory(h => [record, ...h]);
      setCurrent(record);
      setView("reading");
    } catch (err) {
      setError(err.message || "Something went wrong restoring this chapter.");
    } finally {
      setBusy(false);
    }
  }, []);

  const openHistoryItem = (item) => {
    setCurrent(item);
    setView("reading");
  };

  const deleteHistoryItem = async (id) => {
    await dbDelete(id);
    setHistory(h => h.filter(item => item.id !== id));
  };

  return (
    <div style={{
      maxWidth: 640,
      margin: "0 auto",
      minHeight: "100vh",
      padding: "0 18px 60px",
      position: "relative"
    }}>
      {/* Header */}
      <div style={{
        display:"flex", justifyContent:"space-between", alignItems:"center",
        padding: "22px 0 18px",
        borderBottom: view === "home" ? "none" : "1px solid var(--brown)",
        marginBottom: view === "home" ? 0 : 24,
        position: "sticky", top:0, background:"var(--ink)", zIndex:10
      }}>
        <div onClick={() => setView("home")} style={{cursor:"pointer"}}>
          {view !== "home" ? (
            <span style={{
              fontFamily:"'Inter', sans-serif", fontSize:13, color:"var(--gold)",
              display:"flex", alignItems:"center", gap:6
            }}>← Back</span>
          ) : <Logo/>}
        </div>
        {view === "home" && history.length > 0 && (
          <button
            onClick={() => setView("history")}
            style={{
              background:"none", border:"1px solid var(--brown)", borderRadius:20,
              color:"var(--paper-dim)", fontSize:12, padding:"6px 13px",
              fontFamily:"'Inter', sans-serif", cursor:"pointer"
            }}
          >
            History · {history.length}
          </button>
        )}
      </div>

      {view === "home" && (
        <div>
          <div style={{
            fontFamily:"'Source Serif 4', serif",
            fontSize: 26,
            fontWeight: 600,
            lineHeight: 1.3,
            color: "var(--paper)",
            margin: "8px 0 6px"
          }}>
            Turn rough MTL into <span style={{color:"var(--gold)", fontStyle:"italic"}}>readable</span> prose.
          </div>
          <p style={{
            fontFamily:"'Inter', sans-serif", fontSize:14, color:"var(--paper-dim)",
            lineHeight:1.6, margin: "0 0 26px"
          }}>
            Paste a chapter or drop a link. The grammar gets fixed, the voice stays intact, and you can always peek at the original.
          </p>

          <InputPanel onSubmit={handleSubmit} busy={busy} />

          {error && (
            <div style={{
              marginTop: 14, padding: "12px 16px",
              background: "rgba(139,58,58,0.12)", border:"1px solid var(--stamp)",
              borderRadius: 8, color: "var(--stamp-dim)", fontSize: 13,
              fontFamily: "'Inter', sans-serif"
            }}>
              {error}
            </div>
          )}

          {!busy && !current && <EmptyState/>}
        </div>
      )}

      {view === "reading" && current && (
        <div>
          {busy ? <RestoringAnimation/> : (
            <>
              <RawReveal raw={current.rawText} clean={current.cleanText}/>
              <GlyphDivider/>
              <div style={{textAlign:"center"}}>
                <button
                  onClick={() => setView("home")}
                  style={{
                    background:"none", border:"1px solid var(--brown)",
                    borderRadius: 20, color:"var(--paper-dim)",
                    padding:"9px 20px", fontFamily:"'Inter', sans-serif",
                    fontSize:13, cursor:"pointer"
                  }}
                >
                  Restore another chapter
                </button>
              </div>
            </>
          )}
        </div>
      )}

      {view === "history" && (
        <div>
          <div style={{
            fontFamily:"'Source Serif 4', serif", fontSize:20, fontWeight:600,
            marginBottom: 18, color:"var(--paper)"
          }}>
            Your restored chapters
          </div>
          {history.length === 0 ? (
            <div style={{color:"var(--paper-dim)", fontSize:14, fontFamily:"'Inter', sans-serif"}}>
              Nothing here yet.
            </div>
          ) : history.map(item => (
            <HistoryItem key={item.id} item={item} onOpen={openHistoryItem} onDelete={deleteHistoryItem}/>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
